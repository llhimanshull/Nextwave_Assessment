# ============================================================
# DOCKER COMPOSE - MINIJIRA FULL STACK
# RUNS: APP + POSTGRES + REDIS
# ALL PORTS ARE OFFSET TO AVOID CONFLICT WITH LOCALLY RUNNING SERVICES:
#   POSTGRES -> HOST PORT 5433 (LOCAL POSTGRES STAYS ON 5432)
#   REDIS    -> HOST PORT 6380 (LOCAL REDIS STAYS ON 6379)
# ============================================================

services:

  # ==================== POSTGRESQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: minijira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-minijira}
      POSTGRES_USER: ${DB_USER:-minijira_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-minijira_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-minijira_user} -d ${DB_NAME:-minijira}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: minijira-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== SPRING BOOT APP ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minijira-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-minijira}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-minijira_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-minijira_pass}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
